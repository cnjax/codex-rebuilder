name: Rebuild Codex Intel App

on:
  workflow_dispatch:
    inputs:
      codex_dmg_url:
        description: URL to the official Codex.dmg to rebuild
        required: true
        default: https://persistent.oaistatic.com/codex-app-prod/Codex.dmg
      clean_build:
        description: Remove cached artifacts before rebuilding
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  rebuild:
    name: Repack Codex for Intel
    runs-on: macos-15-intel
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download Codex.dmg
        run: curl --fail --location --output Codex.dmg "${{ inputs.codex_dmg_url }}"

      - name: Install Codex CLI
        run: npm install --global @openai/codex

      - name: Rebuild Intel app bundle
        run: |
          if [ "${{ inputs.clean_build }}" = "true" ]; then
            node rebuild_codex.js --clean
          else
            node rebuild_codex.js
          fi

      - name: Package app bundle
        run: ditto -c -k --sequesterRsrc --keepParent Codex_Intel.app Codex_Intel.zip

      - name: Upload rebuilt app
        uses: actions/upload-artifact@v4
        with:
          name: Codex_Intel_app
          path: Codex_Intel.zip
          if-no-files-found: error
